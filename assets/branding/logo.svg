<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Background -->
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#0a0e14"/>

    <!-- Three reward component lines -->
    <path d="M16 44 Q26 44 34 40 Q42 36 50 26 Q56 20 62 18"
          stroke="#10B981"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"
          filter="url(#glow)"/>

    <path d="M16 44 Q26 44 34 46 Q42 50 50 56 Q56 62 62 64"
          stroke="#F59E0B"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"
          filter="url(#glow)"/>

    <path d="M16 44 Q26 44 38 42 Q48 40 62 38"
          stroke="#06B6D4"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"
          filter="url(#glow)"/>

    <!-- Starting point -->
    <circle cx="16" cy="44" r="3" fill="#F0F6FC" opacity="0.8"/>

    <!-- Endpoints -->
    <circle cx="62" cy="18" r="2.5" fill="#10B981" filter="url(#glow)"/>
    <circle cx="62" cy="64" r="2.5" fill="#F59E0B" filter="url(#glow)"/>
    <circle cx="62" cy="38" r="2.5" fill="#06B6D4" filter="url(#glow)"/>
  </g>

  <!-- Wordmark -->
  <text x="108" y="62"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="48"
        font-weight="700"
        letter-spacing="-1"
        fill="#F0F6FC">Flux</text>

  <!-- Tagline -->
  <text x="110" y="82"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13"
        font-weight="500"
        fill="#8B9EB0">The ML development environment</text>
</svg>
