<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0a0e14"/>

  <!-- Divergent lines passing through text -->
  <!-- Green - curves up -->
  <path d="M260 340 Q500 340 700 260 Q900 180 1020 120"
        stroke="#10B981"
        stroke-width="4"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow)"/>

  <!-- Amber - curves down -->
  <path d="M260 340 Q500 360 700 440 Q900 520 1020 540"
        stroke="#F59E0B"
        stroke-width="4"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow)"/>

  <!-- Cyan - stays relatively level -->
  <path d="M260 340 Q500 340 700 330 Q900 320 1020 310"
        stroke="#06B6D4"
        stroke-width="4"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow)"/>

  <!-- Starting point -->
  <circle cx="260" cy="340" r="8" fill="#F0F6FC" opacity="0.9" filter="url(#glow)"/>

  <!-- Endpoints -->
  <circle cx="1020" cy="120" r="6" fill="#10B981" filter="url(#glow)"/>
  <circle cx="1020" cy="540" r="6" fill="#F59E0B" filter="url(#glow)"/>
  <circle cx="1020" cy="310" r="6" fill="#06B6D4" filter="url(#glow)"/>

  <!-- Wordmark - centered, lines pass through -->
  <text x="640" y="380"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="180"
        font-weight="600"
        letter-spacing="-6"
        text-anchor="middle"
        fill="#F0F6FC">Flux</text>
</svg>
