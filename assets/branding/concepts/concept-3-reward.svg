<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0a0e14"/>

  <!-- Three reward component lines - starting aligned, then showing divergence -->
  <!-- Helpfulness (green) - trends up -->
  <path d="M22 55 Q35 55 45 50 Q55 45 65 30 Q72 22 78 20"
        stroke="#10B981"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow3)"/>

  <!-- Harmlessness (amber) - diverges down (warning!) -->
  <path d="M22 55 Q35 55 45 58 Q55 62 65 70 Q72 76 78 78"
        stroke="#F59E0B"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow3)"/>

  <!-- Honesty (cyan) - stays middle -->
  <path d="M22 55 Q35 55 50 52 Q60 50 78 48"
        stroke="#06B6D4"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow3)"/>

  <!-- Starting point indicator -->
  <circle cx="22" cy="55" r="4" fill="#F0F6FC" opacity="0.8"/>

  <!-- Live endpoints -->
  <circle cx="78" cy="20" r="3" fill="#10B981" filter="url(#glow3)"/>
  <circle cx="78" cy="78" r="3" fill="#F59E0B" filter="url(#glow3)"/>
  <circle cx="78" cy="48" r="3" fill="#06B6D4" filter="url(#glow3)"/>
</svg>
