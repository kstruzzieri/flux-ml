<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Concept 2: Data Flow - streaming lines converging, like metrics flowing in -->
  <defs>
    <linearGradient id="cyan2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="fade2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0a0e14"/>

  <!-- Streaming lines - converging to center right -->
  <g fill="none" stroke-width="3" stroke-linecap="round">
    <!-- Top stream -->
    <path d="M20 28 Q40 28 55 42 Q65 52 70 50" stroke="url(#fade2)" filter="url(#glow2)"/>
    <!-- Middle stream -->
    <path d="M20 50 Q35 50 50 50 Q60 50 70 50" stroke="url(#cyan2)" filter="url(#glow2)"/>
    <!-- Bottom stream -->
    <path d="M20 72 Q40 72 55 58 Q65 48 70 50" stroke="url(#fade2)" filter="url(#glow2)"/>
  </g>

  <!-- Convergence point - pulsing node -->
  <circle cx="70" cy="50" r="10" fill="url(#cyan2)" filter="url(#glow2)"/>
  <circle cx="70" cy="50" r="5" fill="#F0F6FC"/>

  <!-- Data particles along streams -->
  <circle cx="32" cy="28" r="2" fill="#06B6D4" opacity="0.5"/>
  <circle cx="45" cy="50" r="2" fill="#06B6D4" opacity="0.7"/>
  <circle cx="35" cy="72" r="2" fill="#06B6D4" opacity="0.5"/>
</svg>
