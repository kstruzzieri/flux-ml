<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Concept 1: Neural/Learning - interconnected nodes suggesting a learning network -->
  <defs>
    <linearGradient id="cyan1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0a0e14"/>

  <!-- Connection lines -->
  <g stroke="url(#cyan1)" stroke-width="2" opacity="0.4">
    <line x1="30" y1="30" x2="50" y2="50"/>
    <line x1="70" y1="30" x2="50" y2="50"/>
    <line x1="30" y1="70" x2="50" y2="50"/>
    <line x1="70" y1="70" x2="50" y2="50"/>
    <line x1="30" y1="30" x2="70" y2="30"/>
    <line x1="30" y1="70" x2="70" y2="70"/>
  </g>

  <!-- Outer nodes -->
  <circle cx="30" cy="30" r="6" fill="url(#cyan1)" opacity="0.6" filter="url(#glow1)"/>
  <circle cx="70" cy="30" r="6" fill="url(#cyan1)" opacity="0.6" filter="url(#glow1)"/>
  <circle cx="30" cy="70" r="6" fill="url(#cyan1)" opacity="0.6" filter="url(#glow1)"/>
  <circle cx="70" cy="70" r="6" fill="url(#cyan1)" opacity="0.6" filter="url(#glow1)"/>

  <!-- Central node - larger, brighter (the "learned" state) -->
  <circle cx="50" cy="50" r="12" fill="url(#cyan1)" filter="url(#glow1)"/>
  <circle cx="50" cy="50" r="6" fill="#F0F6FC"/>
</svg>
