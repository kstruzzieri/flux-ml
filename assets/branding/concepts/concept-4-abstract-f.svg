<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Concept 4: Abstract F - stylized letter that looks like ascending chart/graph -->
  <defs>
    <linearGradient id="cyan4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0a0e14"/>

  <!-- Abstract F made of chart-like elements -->
  <g filter="url(#glow4)">
    <!-- Vertical stem (like y-axis or ascending trend) -->
    <path d="M32 78 L32 22"
          stroke="url(#cyan4)"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>

    <!-- Top horizontal (like a metric line) -->
    <path d="M32 28 Q50 28 68 22"
          stroke="url(#cyan4)"
          stroke-width="6"
          stroke-linecap="round"
          fill="none"/>

    <!-- Middle bar (like another metric) -->
    <path d="M32 50 Q45 50 58 45"
          stroke="url(#cyan4)"
          stroke-width="5"
          stroke-linecap="round"
          fill="none"/>
  </g>

  <!-- Accent dots at line ends (like data points) -->
  <circle cx="68" cy="22" r="4" fill="#22D3EE" filter="url(#glow4)"/>
  <circle cx="58" cy="45" r="3" fill="#22D3EE" opacity="0.7" filter="url(#glow4)"/>
</svg>
